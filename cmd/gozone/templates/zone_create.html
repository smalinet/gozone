<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/dashboard">GoZone</a>
            <span class="nav-subtitle">PowerDNS Admin</span>
        </div>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/zones" class="active">Zones</a>
            {{if .IsAdmin}}<a href="/users">Users</a>{{end}}
            <div class="nav-user">
                <span>{{.User.Username}}</span>
                <a href="/logout" class="btn-logout">Logout</a>
            </div>
        </div>
    </nav>
    <main class="container">
        <div class="page-header">
            <h2>Create Zone</h2>
            <a href="/zones" class="btn btn-secondary">Back to Zones</a>
        </div>

        <div class="card">
            <form method="POST" action="/zones/create">
                <input type="hidden" name="gorilla.csrf.Token" value="{{ .CSRFToken }}">
                <div class="form-group">
                    <label for="name">Domain Name *</label>
                    <input type="text" id="name" name="name" placeholder="example.com" required>
                </div>
                <div class="form-group">
                    <label for="kind">Zone Type</label>
                    <select id="kind" name="kind">
                        {{range .DNSTypes}}
                        <option value="{{.}}">{{.}}</option>
                        {{end}}
                    </select>
                </div>
                <div class="form-group">
                    <label for="nameservers">Nameservers (comma-separated)</label>
                    <input type="text" id="nameservers" name="nameservers" placeholder="ns1.example.com, ns2.example.com">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Zone</button>
                    <a href="/zones" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
