{{define "head"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

{{end}}

    <script src="/static/js/app.js"></script>

{{define "sidebar"}}
<aside class="sidebar">
    <div class="sidebar-header">
        <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
        <div class="sidebar-brand">
            <a href="/dashboard">GoZone</a>
            <span class="nav-subtitle">PowerDNS Admin</span>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="/dashboard" title="Dashboard" class="{{if eq $.Section "dashboard"}}active{{end}}"><span class="nav-icon">◈</span><span class="nav-text">Dashboard</span></a>
        <a href="/zones" title="Zones" class="{{if eq $.Section "zones"}}active{{end}}"><span class="nav-icon">⊙</span><span class="nav-text">Zones</span></a>
        {{if .IsAdmin}}<a href="/tsigkeys" title="TSIG Keys" class="{{if eq $.Section "tsigkeys"}}active{{end}}"><span class="nav-icon">⊕</span><span class="nav-text">TSIG Keys</span></a>{{end}}
        <a href="/profile/api-keys" title="API Keys" class="{{if eq $.Section "apikeys"}}active{{end}}"><span class="nav-icon">⚷</span><span class="nav-text">API Keys</span></a>
        {{if .IsAdmin}}<a href="/users" title="Users" class="{{if eq $.Section "users"}}active{{end}}"><span class="nav-icon">⊞</span><span class="nav-text">Users</span></a>{{end}}
        {{if .IsAdmin}}<a href="/groups" title="Groups" class="{{if eq $.Section "groups"}}active{{end}}"><span class="nav-icon">⊡</span><span class="nav-text">Groups</span></a>{{end}}
        {{if .IsAdmin}}<a href="/templates" title="Templates" class="{{if eq $.Section "templates"}}active{{end}}"><span class="nav-icon">⊗</span><span class="nav-text">Templates</span></a>{{end}}
    </nav>
    <div class="sidebar-footer">
        <a href="/profile" class="username">{{.User.Username}}</a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌓</button>
        <a href="/logout" class="btn-logout" title="Logout">⏻</a>
    </div>
</aside>
{{end}}
