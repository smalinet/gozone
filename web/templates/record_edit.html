{{define "record_edit.html"}}
{{template "head" .}}
<div class="app-layout">
    {{template "sidebar" .}}
    <main class="main-content">
        <div class="container">
<div class="page-header">
    <div>
        <a href="/zones" class="breadcrumb">Zones</a> / <a href="/zones/{{.Zone.ID}}" class="breadcrumb">{{.Zone.Name}}</a> / <h2>Edit Record</h2>
    </div>
</div>

<form method="POST" action="/zones/{{.Zone.ID}}/records/update" class="card">
    <input type="hidden" name="gorilla.csrf.Token" value="{{ .CSRFToken }}">
    <input type="hidden" name="name" value="{{.Record.Name}}">
    <div class="form-row">
        <div class="form-group">
            <label>Name</label>
            <input type="text" value="{{relativeName .Record.Name .Zone.Name}}" disabled class="form-control" style="white-space:nowrap">
        </div>
        <div class="form-group">
            <label for="type">Type</label>
            <select id="type" name="type" disabled>
                {{range .RecordTypes}}
                <option value="{{.}}" {{if eq . $.Record.Type}}selected{{end}}>{{.}}</option>
                {{end}}
            </select>
            <input type="hidden" name="type" value="{{.Record.Type}}">
        </div>
    </div>
    <div class="form-group">
        <label for="content">Content</label>
        {{with index .Record.Records 0}}
        <input type="hidden" name="original_content" value="{{.Content}}">
        <input type="hidden" name="original_priority" value="{{.Priority}}">
        <input type="text" id="content" name="content" value="{{.Content}}" class="form-control" required>
        {{end}}
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="ttl">TTL (seconds)</label>
            <input type="number" id="ttl" name="ttl" value="{{.Record.TTL}}" min="0">
        </div>
        <div class="form-group">
            <label for="priority">Priority</label>
            {{with index .Record.Records 0}}
            <input type="number" id="priority" name="priority" value="{{.Priority}}" min="0">
            {{end}}
        </div>
    </div>
    {{with index .Record.Records 0}}
    <div class="form-group">
        <label>
            <input type="checkbox" name="disabled" {{if .Disabled}}checked{{end}}>
            Disabled
        </label>
    </div>
    {{end}}
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Update Record</button>
        <a href="/zones/{{.Zone.ID}}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
        </div>
    </main>
</div>
{{template "tail" .}}
{{end}}
