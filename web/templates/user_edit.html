{{define "user_edit.html"}}
{{template "head" .}}
<div class="app-layout">
    {{template "sidebar" .}}
    <main class="main-content">
        <div class="container">
<div class="page-header">
    <div>
        <a href="/users" class="breadcrumb">Users</a> / <h2>Edit User: {{.TargetUser.Username}}</h2>
    </div>
</div>

<form method="POST" action="/users/{{.TargetUser.ID}}/update" class="card">
    <input type="hidden" name="gorilla.csrf.Token" value="{{ .CSRFToken }}">
    <div class="form-row">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" value="{{.TargetUser.Username}}" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{.TargetUser.Email}}" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" value="{{.TargetUser.FirstName}}">
        </div>
        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" value="{{.TargetUser.LastName}}">
        </div>
    </div>
    <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" placeholder="Leave empty to keep current">
    </div>
    <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role">
            <option value="user" {{if eq .TargetUser.Role "user"}}selected{{end}}>User</option>
            <option value="admin" {{if eq .TargetUser.Role "admin"}}selected{{end}}>Admin</option>
        </select>
    </div>
    <div class="form-group">
        <label>
            <input type="checkbox" name="enabled" value="1" {{if .TargetUser.Enabled}}checked{{end}}>
            Enabled
        </label>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Update User</button>
        <a href="/users" class="btn btn-secondary">Back to Users</a>
    </div>
</form>
        </div>
    </main>
</div>
{{template "tail" .}}
{{end}}
