{{define "record_create.html"}}
{{template "head" .}}
<div class="app-layout">
    {{template "sidebar" .}}
    <main class="main-content">
        <div class="container">
<div class="page-header">
    <div>
        <a href="/zones" class="breadcrumb">Zones</a> / <a href="/zones/{{.Zone.ID}}" class="breadcrumb">{{.Zone.Name}}</a> / <h2>Add Record</h2>
    </div>
</div>

<form method="POST" action="/zones/{{.Zone.ID}}/records/create" class="card">
    <input type="hidden" name="gorilla.csrf.Token" value="{{ .CSRFToken }}">
    <div class="form-row">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="www" required>
            <small>Leave empty for the zone root (@)</small>
        </div>
        <div class="form-group">
            <label for="type">Type</label>
            <select id="type" name="type">
                {{range .RecordTypes}}
                <option value="{{.}}">{{.}}</option>
                {{end}}
            </select>
        </div>
    </div>
    <div class="form-group">
        <label for="content">Content</label>
        <input type="text" id="content" name="content" placeholder="192.168.1.1" required>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="ttl">TTL (seconds)</label>
            <input type="number" id="ttl" name="ttl" value="3600" min="0">
        </div>
        <div class="form-group">
            <label for="priority">Priority</label>
            <input type="number" id="priority" name="priority" placeholder="10" min="0">
            <small>Only for MX and SRV records</small>
        </div>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create Record</button>
        <a href="/zones/{{.Zone.ID}}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
        </div>
    </main>
</div>
{{template "tail" .}}
{{end}}
