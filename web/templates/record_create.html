{{define "record_create.html"}}
{{template "head" .}}
<div class="app-layout">
    {{template "sidebar" .}}
    <main class="main-content">
        <div class="container">
<div class="page-header">
    <div>
        <a href="/zones" class="breadcrumb">Zones</a> / <a href="/zones/{{.Zone.ID}}" class="breadcrumb">{{.Zone.Name}}</a> / <h2>Add Records</h2>
    </div>
</div>

<form method="POST" action="/zones/{{.Zone.ID}}/records/batch-create" class="card" id="batch-form">
    <input type="hidden" name="gorilla.csrf.Token" value="{{ .CSRFToken }}">

    <div id="record-rows">
        <div class="record-row" style="border:1px solid var(--border);border-radius:6px;padding:1rem;margin-bottom:0.75rem">
            <div class="form-row">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" placeholder="www" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select name="type" class="form-control" required>
                        {{range .RecordTypes}}
                        <option value="{{.}}">{{.}}</option>
                        {{end}}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Content</label>
                    <input type="text" name="content" placeholder="192.168.1.1" class="form-control" required>
                </div>
                <div class="form-group record-prio-group" style="display:none;flex:0 0 6rem">
                    <label>Prio</label>
                    <input type="number" name="priority" value="0" min="0" class="form-control">
                </div>
            </div>
        </div>
    </div>

    <div style="margin-bottom:1rem">
        <button type="button" class="btn btn-secondary" onclick="addRecordRow()">+ Add another record</button>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create Records</button>
        <a href="/zones/{{.Zone.ID}}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

<script>
(function() {
    function togglePriority(select) {
        var t = select.value;
        var row = select.closest('.record-row');
        var grp = row.querySelector('.record-prio-group');
        grp.style.display = (t === 'MX' || t === 'SRV') ? '' : 'none';
    }
    document.querySelector('#batch-form').addEventListener('change', function(e) {
        if (e.target.name === 'type') togglePriority(e.target);
    });
    document.querySelectorAll('#batch-form select[name=type]').forEach(function(s) { togglePriority(s); });
})();
</script>
        </div>
    </main>
</div>
{{template "tail" .}}
{{end}}
