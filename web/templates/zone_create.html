{{define "zone_create.html"}}
{{template "head" .}}
<div class="app-layout">
    {{template "sidebar" .}}
    <main class="main-content">
        <div class="container">
<div class="page-header">
    <div>
        <a href="/zones" class="breadcrumb">Zones</a> / <h2>Create Zone</h2>
    </div>
</div>

<form method="POST" action="/zones/create" class="card">
    <input type="hidden" name="gorilla.csrf.Token" value="{{ .CSRFToken }}">
    <div class="form-group">
        <label for="name">Zone Name</label>
        <input type="text" id="name" name="name" placeholder="example.com" required>
        <small>Fully qualified domain name (e.g. example.com)</small>
    </div>
    <div class="form-group">
        <label for="kind">Type</label>
        <select id="kind" name="kind">
            {{range .DNSTypes}}
            <option value="{{.}}" {{if eq . "Native"}}selected{{end}}>{{.}}</option>
            {{end}}
        </select>
    </div>
    <div class="form-group">
        <label for="nameservers">Nameservers</label>
        <input type="text" id="nameservers" name="nameservers" placeholder="ns1.example.com,ns2.example.com">
        <small>Comma-separated list of nameservers</small>
    </div>

    {{if .Templates}}
    <hr style="margin:1.5rem 0;border-color:var(--border)">
    <div class="form-group">
        <label for="template_id">Apply Template (optional)</label>
        <select id="template_id" name="template_id" onchange="toggleTemplateVars(this.value)">
            <option value="">None</option>
            {{range .Templates}}
            <option value="{{.ID}}">{{.Name}} — {{.Description}}</option>
            {{end}}
        </select>
    </div>
    <div id="template-vars" style="display:none">
        {{range $.TemplateVars}}
        <div class="form-group">
            <label for="var_{{.}}"><code>{{.}}</code></label>
            <input type="text" id="var_{{.}}" name="var_{{.}}" class="form-control" placeholder="Value for {{.}}">
        </div>
        {{end}}
    </div>
    {{end}}

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create Zone</button>
        <a href="/zones" class="btn btn-secondary">Cancel</a>
    </div>
</form>
        </div>
    </main>
</div>
<script>
function toggleTemplateVars(val) {
    document.getElementById('template-vars').style.display = val ? 'block' : 'none';
}
</script>
{{template "tail" .}}
{{end}}
