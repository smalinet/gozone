# gozone - PowerDNS Admin Interface Configuration
#
# Database driver choices:
#   sqlite3    - Local SQLite file (default, recommended for development)
#   mysql      - MySQL/MariaDB (production)
#   postgres   - PostgreSQL (production)
#
# Example DSNs:
#   sqlite3:  "./data/gozone.db"
#   mysql:    "user:password@tcp(localhost:3306)/gozone"
#   postgres: "host=localhost port=5432 user=gozone password=secret dbname=gozone sslmode=disable"

server:
  host: "0.0.0.0"
  port: 8080
  # Placeholder: left as-is, a random key is auto-generated at startup (and
  # changes on every restart). Set a persistent value here or via
  # GOZONE_SECRET_KEY in production. Generate one with: openssl rand -hex 32
  secret_key: "change-me-to-a-random-secret-key"

database:
  driver: "sqlite3"
  dsn: "./data/gozone.db"

powerdns:
  api_url: "http://localhost:8081"
  api_key: "changeme"
  server_id: "localhost"

auth:
  session_duration_hours: 24
  bcrypt_cost: 12

logging:
  level: "info"
